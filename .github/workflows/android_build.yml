
name: Build Android App & Upload APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Install, Build, and Upload APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Start EAS Build and get APK URL
        id: build
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: echo "json_output=$(eas build --platform android --wait --non-interactive --json)" >> $GITHUB_OUTPUT

      - name: Download APK from URL
        env:
          BUILD_JSON: ${{ steps.build.outputs.json_output }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          APK_URL=$(echo "$BUILD_JSON" | jq -r '.artifacts.buildUrl')
          echo "Found APK URL: $APK_URL"
          wget -q --show-progress -O kiyara-app.apk "$APK_URL"
          echo "APK downloaded successfully as kiyara-app.apk"

      - name: Upload APK as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kiyara-android-apk
          path: kiyara-app.apk
          retention-days: 7
