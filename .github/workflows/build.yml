
name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g eas-cli

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start Android Build
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get Build Artifact URL
        run: |
          set -e
          echo "Fetching latest build details..."
          BUILD_JSON=$(eas build:list --platform android --limit 1 --json)
          
          echo "--- Latest Build JSON ---"
          echo $BUILD_JSON
          echo "-------------------------"

          APK_URL=$(echo $BUILD_JSON | jq -r '.[0].artifacts.buildUrl')

          if [ -z "$APK_URL" ] || [ "$APK_URL" == "null" ]; then
            echo "Error: Could not extract buildUrl from eas build:list."
            exit 1
          fi

          echo "Found APK URL: $APK_URL"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
