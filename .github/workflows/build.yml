
name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g eas-cli

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build APK and Get URL
        run: |
          set -e
          # Run the build and wait for it to complete, outputting the result to a file.
          # The --wait flag is crucial for CI environments.
          eas build --platform android --profile production --non-interactive --wait --json > build.json

          echo "--- EAS Build JSON Output ---"
          cat build.json
          echo "-----------------------------"

          # The output of a successful build with --wait should be a single JSON object
          APK_URL=$(cat build.json | jq -r '.artifacts.buildUrl')

          # Fallback for older/different JSON structures (e.g., array)
          if [ -z "$APK_URL" ] || [ "$APK_URL" == "null" ]; then
            echo "Parsing as object failed, trying as array..."
            APK_URL=$(cat build.json | jq -r '.[0].artifacts.buildUrl')
          fi

          # Final check to ensure the URL was extracted
          if [ -z "$APK_URL" ] || [ "$APK_URL" == "null" ]; then
            echo "Error: Could not extract buildUrl from the EAS build output."
            exit 1
          fi

          echo "Found APK URL: $APK_URL"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
